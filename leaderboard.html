<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBERVERSE — Global Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
/* ── BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:#030a12;color:#e8f4f8;min-height:100vh;overflow-x:hidden;position:relative;}

/* ── ANIMATED BACKGROUND ── */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,180,216,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,216,.04) 1px,transparent 1px);background-size:50px 50px;z-index:0;pointer-events:none;animation:gridShift 20s linear infinite;}
@keyframes gridShift{0%{background-position:0 0}100%{background-position:50px 50px}}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 20%,rgba(0,119,182,.12) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 85% 80%,rgba(0,180,216,.08) 0%,transparent 60%);z-index:0;pointer-events:none;}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);z-index:1;pointer-events:none;}

/* ── LAYOUT ── */
.lb-app{max-width:900px;margin:0 auto;padding:32px 24px 100px;position:relative;z-index:10;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:12px;position:relative;}
.topbar::after{content:'';position:absolute;bottom:-16px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#00b4d8,rgba(0,180,216,.3),transparent);}
.topbar-logo{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#e8f4f8 0%,#00b4d8 60%,#48cae4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(0,180,216,.4));}
.topbar-logo span{font-size:.55rem;font-family:'IBM Plex Mono',monospace;letter-spacing:.2em;color:#00b4d8;background:rgba(0,180,216,.08);border:1px solid rgba(0,180,216,.2);padding:3px 8px;border-radius:4px;display:inline-block;margin-left:10px;vertical-align:middle;}
.back-btn{display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;color:#4a7fa0;background:rgba(0,20,40,.6);border:1px solid rgba(0,180,216,.18);border-radius:8px;padding:8px 14px;cursor:pointer;transition:all .2s;text-decoration:none;}
.back-btn:hover{color:#00b4d8;border-color:rgba(0,180,216,.4);box-shadow:0 0 20px rgba(0,180,216,.2);}

/* ── HEADER SECTION ── */
.lb-header{text-align:center;margin-bottom:36px;animation:fu .5s ease both;}
.lb-title{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;background:linear-gradient(135deg,#fff,#ffd166,#ff9f1c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 24px rgba(255,209,102,.4));margin-bottom:8px;}
.lb-sub{font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.18em;color:#4a7fa0;}
.lb-live-badge{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.12em;color:#2ecc71;background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.2);border-radius:20px;padding:5px 12px;margin-top:12px;}
.lb-live-badge::before{content:'';width:6px;height:6px;background:#2ecc71;border-radius:50%;box-shadow:0 0 8px #2ecc71;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CURRENT USER RANK CARD ── */
.my-rank-card{background:linear-gradient(135deg,rgba(0,119,182,.2),rgba(0,180,216,.08));border:1px solid rgba(0,180,216,.35);border-radius:14px;padding:18px 22px;margin-bottom:28px;display:flex;align-items:center;gap:16px;animation:fu .5s .1s ease both;position:relative;overflow:hidden;}
.my-rank-card::before{content:'YOUR RANK';position:absolute;top:8px;right:14px;font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:.2em;color:rgba(0,180,216,.4);}
.my-rank-num{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:#00b4d8;min-width:60px;text-align:center;filter:drop-shadow(0 0 12px rgba(0,180,216,.5));}
.my-rank-divider{width:1px;height:48px;background:rgba(0,180,216,.25);flex-shrink:0;}
.my-rank-info{flex:1;}
.my-rank-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:#e8f4f8;margin-bottom:3px;}
.my-rank-meta{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:#4a7fa0;}
.my-rank-score{font-family:'IBM Plex Mono',monospace;font-size:1.4rem;font-weight:600;color:#ffd166;text-align:right;}
.my-rank-score span{display:block;font-size:.55rem;letter-spacing:.1em;color:#4a7fa0;text-align:right;margin-top:2px;}

/* ── PODIUM (top 3) ── */
.podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:12px;margin-bottom:32px;align-items:end;animation:fu .5s .2s ease both;}
.podium-slot{background:rgba(0,20,40,.7);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px 14px;text-align:center;position:relative;transition:transform .2s;}
.podium-slot:hover{transform:translateY(-4px);}
.podium-slot.rank-1{background:linear-gradient(145deg,rgba(255,209,102,.12),rgba(255,150,0,.06));border-color:rgba(255,209,102,.3);box-shadow:0 0 30px rgba(255,209,102,.15);}
.podium-slot.rank-2{background:linear-gradient(145deg,rgba(192,192,192,.1),rgba(150,150,150,.04));border-color:rgba(180,180,180,.25);}
.podium-slot.rank-3{background:linear-gradient(145deg,rgba(205,127,50,.1),rgba(160,100,40,.04));border-color:rgba(200,130,50,.25);}
.podium-medal{font-size:2rem;margin-bottom:6px;}
.podium-rank{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.2em;color:#4a7fa0;margin-bottom:8px;}
.podium-name{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:#e8f4f8;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.podium-score{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:600;margin-bottom:6px;}
.rank-1 .podium-score{color:#ffd166;}
.rank-2 .podium-score{color:#c0c0c0;}
.rank-3 .podium-score{color:#cd7f32;}
.podium-badges{font-size:.9rem;letter-spacing:2px;min-height:20px;}
.podium-sessions{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:#4a7fa0;}

/* ── TABLE ── */
.lb-table-wrap{background:rgba(4,11,29,.8);border:1px solid rgba(0,180,216,.15);border-radius:14px;overflow:hidden;animation:fu .6s .3s ease both;}
.lb-table-header{padding:14px 20px;border-bottom:1px solid rgba(0,180,216,.12);display:grid;grid-template-columns:52px 1fr 100px 80px 90px;gap:8px;align-items:center;}
.lb-th{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.15em;color:#4a7fa0;text-transform:uppercase;}
.lb-row{display:grid;grid-template-columns:52px 1fr 100px 80px 90px;gap:8px;align-items:center;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:rgba(0,180,216,.04);}
.lb-row.is-me{background:rgba(0,180,216,.08);border-left:2px solid #00b4d8;}
.lb-row.is-me .lb-rank-num{color:#00b4d8;}
.lb-rank-num{font-family:'IBM Plex Mono',monospace;font-size:.8rem;font-weight:600;color:#4a7fa0;text-align:center;}
.lb-rank-num.gold{color:#ffd166;}
.lb-rank-num.silver{color:#c0c0c0;}
.lb-rank-num.bronze{color:#cd7f32;}
.lb-player{display:flex;align-items:center;gap:10px;overflow:hidden;}
.lb-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,rgba(0,119,182,.6),rgba(0,180,216,.4));border:1px solid rgba(0,180,216,.3);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#00b4d8;flex-shrink:0;font-family:'Syne',sans-serif;}
.lb-pname{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:600;color:#e8f4f8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-pemail{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:#4a7fa0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-badges{font-size:.82rem;letter-spacing:2px;text-align:center;}
.lb-badge-count{font-family:'IBM Plex Mono',monospace;font-size:.8rem;font-weight:600;color:#ffd166;text-align:center;}
.lb-score{font-family:'IBM Plex Mono',monospace;font-size:.85rem;font-weight:600;color:#caf0f8;text-align:right;}

/* ── RISK PILL ── */
.risk-pill{font-family:'IBM Plex Mono',monospace;font-size:.5rem;font-weight:600;padding:2px 6px;border-radius:3px;letter-spacing:.06em;white-space:nowrap;}
.risk-pill.low{background:rgba(46,204,113,.12);color:#2ecc71;border:1px solid rgba(46,204,113,.25);}
.risk-pill.mod{background:rgba(244,162,97,.1);color:#f4a261;border:1px solid rgba(244,162,97,.2);}
.risk-pill.high{background:rgba(230,57,70,.1);color:#e63946;border:1px solid rgba(230,57,70,.2);}
.risk-pill.none{background:rgba(255,255,255,.05);color:#4a7fa0;border:1px solid rgba(255,255,255,.08);}

/* ── LOADING / EMPTY ── */
.lb-loading{text-align:center;padding:60px 20px;}
.lb-spinner{width:40px;height:40px;border:3px solid rgba(0,180,216,.2);border-top-color:#00b4d8;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.lb-loading-txt{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:#4a7fa0;letter-spacing:.12em;}
.lb-empty{text-align:center;padding:60px 20px;color:#4a7fa0;font-family:'IBM Plex Mono',monospace;font-size:.8rem;}

/* ── REFRESH BTN ── */
.lb-footer{display:flex;justify-content:center;margin-top:24px;gap:12px;animation:fu .6s .5s ease both;}
.lb-refresh-btn{display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.12em;color:#4a7fa0;background:rgba(0,20,40,.6);border:1px solid rgba(0,180,216,.18);border-radius:8px;padding:10px 18px;cursor:pointer;transition:all .2s;}
.lb-refresh-btn:hover{color:#00b4d8;border-color:rgba(0,180,216,.4);}
.lb-refresh-btn.spinning svg{animation:spin .6s linear infinite;}

/* ── STATS ROW ── */
.lb-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;animation:fu .5s .15s ease both;}
.lb-stat-card{background:rgba(4,11,29,.7);border:1px solid rgba(0,180,216,.12);border-radius:10px;padding:16px;text-align:center;}
.lb-stat-val{font-family:'IBM Plex Mono',monospace;font-size:1.4rem;font-weight:600;color:#caf0f8;margin-bottom:4px;}
.lb-stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:.55rem;letter-spacing:.15em;color:#4a7fa0;text-transform:uppercase;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .lb-table-header,.lb-row{grid-template-columns:40px 1fr 70px 60px;}
  .lb-th:last-child,.lb-score{display:none;}
  .podium{grid-template-columns:1fr 1.1fr 1fr;gap:8px;}
  .my-rank-card{flex-wrap:wrap;}
}

@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="scanlines"></div>
<a href="#main-content" class="skip-link">Skip to main content</a>
<button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>

<div class="lb-app" id="main-content" role="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-logo">CYBERVERSE <span>HQ</span></div>
    <a class="back-btn" href="dashboard.html">← Dashboard</a>
  </div>

  <!-- HEADER -->
  <div class="lb-header">
    <div class="lb-title">🏆 GLOBAL LEADERBOARD</div>
    <div class="lb-sub">// TOP CYBER AGENTS · RANKED BY TOTAL SCORE</div>
    <div class="lb-live-badge">LIVE DATA · SYNCED FROM SERVER</div>
  </div>

  <!-- GLOBAL STATS ROW -->
  <div class="lb-stats-row" id="lb-stats-row">
    <div class="lb-stat-card"><div class="lb-stat-val" id="stat-players">—</div><div class="lb-stat-lbl">Total Players</div></div>
    <div class="lb-stat-card"><div class="lb-stat-val" id="stat-top">—</div><div class="lb-stat-lbl">Top Score</div></div>
    <div class="lb-stat-card"><div class="lb-stat-val" id="stat-avg">—</div><div class="lb-stat-lbl">Avg Score</div></div>
  </div>

  <!-- MY RANK CARD -->
  <div class="my-rank-card" id="my-rank-card" style="display:none;">
    <div class="my-rank-num" id="my-rank-num">#—</div>
    <div class="my-rank-divider"></div>
    <div class="my-rank-info">
      <div class="my-rank-name" id="my-rank-name">—</div>
      <div class="my-rank-meta" id="my-rank-meta">—</div>
    </div>
    <div>
      <div class="my-rank-score" id="my-rank-score">—<span>YOUR SCORE</span></div>
    </div>
  </div>

  <!-- PODIUM (top 3) -->
  <div class="podium" id="podium" style="display:none;"></div>

  <!-- FULL TABLE -->
  <div class="lb-table-wrap" id="lb-table-wrap">
    <div class="lb-loading" id="lb-loading">
      <div class="lb-spinner"></div>
      <div class="lb-loading-txt">FETCHING LEADERBOARD DATA...</div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="lb-footer">
    <button class="lb-refresh-btn" id="refresh-btn" onclick="loadLeaderboard()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      REFRESH
    </button>
    <a class="lb-refresh-btn" href="levels.html">🎮 PLAY NOW</a>
  </div>

</div><!-- end lb-app -->

<script src="shared.js"></script>
<script>
const currentUser = DB.getCurrent();

/* ── rank medal helpers ── */
function medalFor(i){ return i===0?'🥇':i===1?'🥈':i===2?'🥉':''; }
function rankClass(i){ return i===0?'gold':i===1?'silver':i===2?'bronze':''; }
function riskClass(label){
  if(!label||label==='UNASSESSED') return 'none';
  if(label.includes('LOW'))  return 'low';
  if(label.includes('MOD'))  return 'mod';
  return 'high';
}
function initials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

async function loadLeaderboard(){
  const wrap = document.getElementById('lb-table-wrap');
  const btn  = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  wrap.innerHTML = `<div class="lb-loading"><div class="lb-spinner"></div><div class="lb-loading-txt">FETCHING LEADERBOARD DATA...</div></div>`;

  let data;
  try {
    data = await DB.leaderboard();
  } catch(e){
    wrap.innerHTML = `<div class="lb-empty">⚠ Could not connect to server.<br><span style="font-size:.65rem;color:#4a7fa0;">Make sure the CYBERVERSE server is running.</span></div>`;
    btn.classList.remove('spinning');
    return;
  }

  btn.classList.remove('spinning');

  if(!data || data.length === 0){
    wrap.innerHTML = `<div class="lb-empty">No players yet.<br><span style="font-size:.65rem;">Be the first to complete a level!</span></div>`;
    return;
  }

  /* ── global stats ── */
  const totalPlayers = data.length;
  const topScore     = data[0].totalScore || 0;
  const avgScore     = Math.round(data.reduce((a,u)=>a+(u.totalScore||0),0) / totalPlayers);
  document.getElementById('stat-players').textContent = totalPlayers;
  document.getElementById('stat-top').textContent     = topScore.toLocaleString('en-IN');
  document.getElementById('stat-avg').textContent     = avgScore.toLocaleString('en-IN');

  /* ── my rank card ── */
  if(currentUser){
    const myIdx = data.findIndex(u => u.email === currentUser.email);
    if(myIdx >= 0){
      const me = data[myIdx];
      document.getElementById('my-rank-num').textContent  = '#' + (myIdx+1);
      document.getElementById('my-rank-name').textContent = me.name;
      document.getElementById('my-rank-meta').textContent = `${(me.badges||[]).length} badge${(me.badges||[]).length!==1?'s':''} · ${me.sessions||0} session${(me.sessions||0)!==1?'s':''}`;
      document.getElementById('my-rank-score').innerHTML  = (me.totalScore||0).toLocaleString('en-IN') + '<span>YOUR SCORE</span>';
      document.getElementById('my-rank-card').style.display = 'flex';
    }
  }

  /* ── podium (top 3) ── */
  const podiumEl = document.getElementById('podium');
  if(data.length >= 2){
    // reorder for visual: [2nd, 1st, 3rd]
    const order = data.length >= 3 ? [data[1], data[0], data[2]] : [null, data[0], data[1]||null];
    const podiumRanks = data.length >= 3 ? [2,1,3] : [2,1,null];
    podiumEl.innerHTML = order.map((u,i) => {
      if(!u) return '<div></div>';
      const rank = podiumRanks[i];
      const cls  = rank===1?'rank-1':rank===2?'rank-2':'rank-3';
      const medal= rank===1?'🥇':rank===2?'🥈':'🥉';
      const isMe = currentUser && u.email===currentUser.email;
      return `<div class="podium-slot ${cls}${isMe?' is-me':''}">
        <div class="podium-medal">${medal}</div>
        <div class="podium-rank">#${rank}${isMe?' · YOU':''}</div>
        <div class="podium-name" title="${u.name}">${u.name}</div>
        <div class="podium-score">${(u.totalScore||0).toLocaleString('en-IN')}<small style="font-size:.5rem;color:#4a7fa0;font-family:'IBM Plex Mono',monospace;display:block;margin-top:1px;">pts</small></div>
        <div class="podium-badges">${(u.badges||[]).join('')||'—'}</div>
        <div class="podium-sessions">${u.sessions||0} session${(u.sessions||0)!==1?'s':''}</div>
      </div>`;
    }).join('');
    podiumEl.style.display = 'grid';
  }

  /* ── full table ── */
  const startRank = data.length >= 3 ? 4 : 1;  // show all from rank 4+ in table; top 3 in podium if >= 3 players
  const tableData = data.length >= 3 ? data.slice(3) : data;

  if(tableData.length === 0){
    wrap.innerHTML = `<div class="lb-empty" style="padding:30px;">Top 3 players shown above.</div>`;
    return;
  }

  wrap.innerHTML = `
    <div class="lb-table-header">
      <div class="lb-th" style="text-align:center;">RANK</div>
      <div class="lb-th">AGENT</div>
      <div class="lb-th" style="text-align:center;">BADGES</div>
      <div class="lb-th" style="text-align:center;">COUNT</div>
      <div class="lb-th" style="text-align:right;">SCORE</div>
    </div>
    ${tableData.map((u, idx) => {
      const rank   = idx + startRank;
      const isMe   = currentUser && u.email === currentUser.email;
      const badges = u.badges || [];
      const rc     = riskClass(u.riskProfile);
      return `<div class="lb-row${isMe?' is-me':''}">
        <div class="lb-rank-num ${rankClass(rank-1)}">#${rank}${isMe?'<br><span style="font-size:.42rem;color:#00b4d8;letter-spacing:.1em;">YOU</span>':''}</div>
        <div class="lb-player">
          <div class="lb-avatar">${initials(u.name)}</div>
          <div>
            <div class="lb-pname">${u.name}</div>
            <div style="display:flex;gap:6px;align-items:center;margin-top:2px;">
              <span class="risk-pill ${rc}">${u.riskProfile||'UNASSESSED'}</span>
              <span style="font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:#4a7fa0;">${u.sessions||0} sessions</span>
            </div>
          </div>
        </div>
        <div class="lb-badges">${badges.join('') || '—'}</div>
        <div class="lb-badge-count">${badges.length}</div>
        <div class="lb-score">${(u.totalScore||0).toLocaleString('en-IN')}</div>
      </div>`;
    }).join('')}`;
}

loadLeaderboard();
</script>
</body>
</html>
