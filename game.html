.sh-label{font-family:var(--font-mono);font-size:.65rem;letter-spacing:.2em;color:var(--accent);margin-bottom:6px;}
.sh-title{font-family:var(--font-disp);font-size:1.5rem;font-weight:700;color:var(--white);}
.sh-meta{font-family:var(--font-mono);font-size:.68rem;color:var(--muted);margin-top:4px;}
.scenario-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap;}

/* ══ CINEMATIC BAD OVERLAY ══ */
#cin-overlay{position:fixed;inset:0;z-index:5000;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;opacity:0;pointer-events:none;transition:opacity 0.3s ease;}
#cin-overlay.active{opacity:1;pointer-events:all;}
#cin-overlay::before{content:'';position:absolute;inset:0;z-index:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);pointer-events:none;animation:sl .1s linear infinite;}
@keyframes sl{0%{background-position:0 0}100%{background-position:0 4px}}
.cin-vig{position:absolute;inset:0;z-index:1;background:radial-gradient(ellipse at center,transparent 40%,rgba(230,57,70,.4) 100%);animation:vigp .8s ease-in-out infinite alternate;pointer-events:none;}
@keyframes vigp{0%{opacity:.6}100%{opacity:1}}
.cin-term{position:relative;z-index:10;width:min(700px,92vw);background:rgba(8,12,18,.97);border:1px solid #e63946;border-radius:8px;box-shadow:0 0 80px rgba(230,57,70,.3),inset 0 0 40px rgba(230,57,70,.04);overflow:hidden;max-height:90vh;display:flex;flex-direction:column;}
.cin-tbar{background:rgba(230,57,70,.15);border-bottom:1px solid rgba(230,57,70,.3);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.cin-dot{width:10px;height:10px;border-radius:50%;}
.cin-dot.r{background:#e63946}.cin-dot.a{background:#f4a261}.cin-dot.g{background:#2ecc71}
.cin-tbar-txt{font-family:var(--font-mono);font-size:.65rem;letter-spacing:.2em;color:rgba(230,57,70,.8);margin-left:6px;text-transform:uppercase;}
.cin-tbar-live{margin-left:auto;font-family:var(--font-mono);font-size:.6rem;color:#e63946;animation:blink .6s ease-in-out infinite;}
.cin-body{padding:18px 20px;font-family:var(--font-mono);font-size:.76rem;line-height:1.8;color:#e63946;overflow-y:auto;flex:1;}
.cin-line{display:flex;align-items:flex-start;gap:10px;margin-bottom:2px;opacity:0;transform:translateX(-6px);transition:opacity .2s ease,transform .2s ease;}
.cin-line.show{opacity:1;transform:translateX(0);}
.cin-p{color:rgba(230,57,70,.5);flex-shrink:0;min-width:36px;}
.cr{color:#e63946}.ca{color:#f4a261}.cg{color:#2ecc71}.cd{color:rgba(230,57,70,.4)}.cw{color:#eef4fa}.cc{color:#00b4d8}
.cin-accs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;opacity:0;transition:opacity .3s ease;}
.cin-accs.show{opacity:1;}
.cin-acc{background:rgba(230,57,70,.06);border:1px solid rgba(230,57,70,.2);border-radius:4px;padding:9px 11px;}
.cin-acc.comp{border-color:rgba(230,57,70,.6);background:rgba(230,57,70,.12);animation:ap .5s ease-in-out 3;}
@keyframes ap{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px rgba(230,57,70,.5)}}
.cin-acc-n{font-family:var(--font-mono);font-size:.6rem;color:rgba(255,255,255,.7);margin-bottom:2px;}
.cin-acc-s{font-family:var(--font-mono);font-size:.58rem;color:rgba(230,57,70,.5);}
.cin-acc-s.bad{color:#e63946;font-weight:600;}
.cin-prog-wrap{margin:12px 0 6px;opacity:0;transition:opacity .3s ease;}
.cin-prog-wrap.show{opacity:1;}
.cin-prog-lbl{font-family:var(--font-mono);font-size:.58rem;color:rgba(230,57,70,.6);margin-bottom:4px;letter-spacing:.1em;}
.cin-prog-track{height:4px;background:rgba(230,57,70,.15);border-radius:2px;overflow:hidden;}
.cin-prog-fill{height:100%;background:linear-gradient(90deg,#e63946,#ff6b6b);border-radius:2px;width:0%;transition:width 2.5s cubic-bezier(.1,.8,.3,1);box-shadow:0 0 8px rgba(230,57,70,.6);}
.cin-dmg{text-align:center;margin:14px 0 6px;opacity:0;transition:opacity .4s ease;}
.cin-dmg.show{opacity:1;}
.cin-dmg-amt{font-family:var(--font-disp);font-size:clamp(1.8rem,5vw,3rem);font-weight:800;color:#e63946;display:inline-block;}
.cin-dmg-lbl{font-family:var(--font-mono);font-size:.62rem;letter-spacing:.2em;color:rgba(230,57,70,.6);margin-top:3px;}
.cin-foot{border-top:1px solid rgba(230,57,70,.2);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;opacity:0;transition:opacity .4s ease;flex-shrink:0;}
.cin-foot.show{opacity:1;}
.cin-foot-msg{font-family:var(--font-mono);font-size:.62rem;color:rgba(230,57,70,.5);letter-spacing:.1em;}
.cin-cont{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;background:rgba(230,57,70,.15);border:1px solid rgba(230,57,70,.5);color:#e63946;padding:9px 18px;border-radius:4px;cursor:pointer;transition:all .2s;}
.cin-cont:hover{background:rgba(230,57,70,.25);box-shadow:0 0 16px rgba(230,57,70,.3);}
.glitch{animation:glm .3s ease-in-out 4 .5s;}
@keyframes glm{0%,100%{transform:translate(0)}20%{transform:translate(-3px,1px);filter:hue-rotate(90deg)}40%{transform:translate(3px,-1px);filter:hue-rotate(-90deg)}60%{transform:translate(-2px,2px)}80%{transform:translate(2px,-2px);filter:hue-rotate(45deg)}}

/* ══ GOOD OUTCOME OVERLAY ══ */
#cin-good{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s ease;}
#cin-good.active{opacity:1;pointer-events:all;}
.cin-shield{font-size:4rem;margin-bottom:18px;animation:sb .6s cubic-bezier(.34,1.56,.64,1) forwards;transform:scale(0);}
@keyframes sb{to{transform:scale(1)}}
.cin-gtitle{font-family:var(--font-disp);font-size:clamp(1.6rem,5vw,2.8rem);font-weight:800;color:var(--green);margin-bottom:8px;text-align:center;animation:fu .5s .3s ease both;}
.cin-gsub{font-family:var(--font-mono);font-size:.72rem;color:rgba(46,204,113,.6);letter-spacing:.2em;text-align:center;margin-bottom:28px;animation:fu .5s .5s ease both;}
.cin-gtip{max-width:480px;background:rgba(46,204,113,.07);border:1px solid rgba(46,204,113,.2);border-radius:6px;padding:16px 20px;font-size:.86rem;color:rgba(255,255,255,.75);line-height:1.7;text-align:center;animation:fu .5s .7s ease both;margin-bottom:24px;}
.cin-gtip strong{color:var(--green);}
.cin-pts{display:inline-flex;align-items:center;gap:8px;background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.3);border-radius:30px;padding:10px 24px;font-family:var(--font-mono);font-size:.88rem;color:var(--green);animation:fu .5s .9s ease both;margin-bottom:28px;}
.cin-parts{position:fixed;inset:0;pointer-events:none;z-index:4999;}
.cin-part{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--green);animation:pb 1s ease-out forwards;}
@keyframes pb{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ══ SOCIAL MEDIA ══ */
.social-app{background:var(--surface);border:1px solid var(--rim);border-radius:8px;overflow:hidden;margin-bottom:28px;box-shadow:var(--shadow);}
.social-tbar{background:var(--ink3);border-bottom:1px solid var(--rim);padding:10px 16px;display:flex;align-items:center;gap:10px;}
.social-tbar-name{font-family:var(--font-disp);font-size:.9rem;font-weight:700;color:var(--white);}
.social-tbar-sub{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);margin-left:auto;}
.social-dm{padding:16px 18px;}
.social-dmh{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--rim);}
.social-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6a11cb,#2575fc);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.social-sname{font-family:var(--font-disp);font-size:.95rem;font-weight:700;color:var(--white);}
.social-smeta{font-family:var(--font-mono);font-size:.62rem;color:var(--muted);}
.social-msg{background:var(--ink3);border:1px solid var(--rim);border-radius:4px 16px 16px 16px;padding:14px 16px;font-size:.88rem;color:var(--body);line-height:1.7;margin-bottom:10px;}
.social-time{font-family:var(--font-mono);font-size:.6rem;color:var(--muted);margin-bottom:16px;}
.social-lp{background:var(--ink2);border:1px solid var(--rim2);border-left:3px solid var(--red);border-radius:4px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.social-lp-dom{font-family:var(--font-mono);font-size:.62rem;color:var(--red);margin-bottom:3px;}
.social-lp-ttl{font-size:.82rem;color:var(--hi);font-weight:600;}

/* ══ JOB CARD ══ */
.job-card{background:var(--surface);border:1px solid var(--rim);border-radius:8px;overflow:hidden;margin-bottom:28px;box-shadow:var(--shadow);}
.job-head{background:linear-gradient(135deg,#0a2342,#0d3b6e);padding:18px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--rim);}
.job-logo{width:48px;height:48px;border-radius:8px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
.job-co{font-family:var(--font-disp);font-size:1.05rem;font-weight:700;color:#fff;}
.job-dom{font-family:var(--font-mono);font-size:.62rem;color:rgba(255,255,255,.5);margin-top:2px;}
.job-body{padding:18px 20px;}
.job-ttl{font-family:var(--font-disp);font-size:1.2rem;font-weight:700;color:var(--white);margin-bottom:8px;}
.job-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.job-tag{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.06em;padding:3px 8px;border-radius:2px;background:rgba(0,180,216,.1);border:1px solid rgba(0,180,216,.2);color:var(--accent);}
.job-desc{font-size:.88rem;color:var(--body);line-height:1.7;margin-bottom:14px;}
.job-cta{background:rgba(0,180,216,.08);border:1px solid rgba(0,180,216,.2);border-radius:4px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.job-cta-t{font-family:var(--font-mono);font-size:.72rem;color:var(--accent);}
.job-cta-l{font-family:var(--font-mono);font-size:.62rem;color:var(--red);word-break:break-all;}
.job-rf{background:rgba(230,57,70,.07);border:1px solid rgba(230,57,70,.2);border-radius:4px;padding:10px 14px;margin-top:12px;font-size:.8rem;color:var(--amber);line-height:1.6;}
</style>

let G={level:1,idx:0,health:100,trust:100,score:0,good:0,bad:0,pending:false};
function loadState(){try{const s=JSON.parse(localStorage.getItem('cv_game_state')||'null');if(s)G={...G,...s};}catch(e){}}
function saveState(){localStorage.setItem('cv_game_state',JSON.stringify(G));}

let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playRingtone(loop){const a=new Audio('ringtone.mpeg');a.loop=loop;a.volume=0.8;a.play().catch(e=>{});return{stop(){a.pause();a.currentTime=0;}};}
function playDecline(){const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.value=380;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.5);o.start();o.stop(c.currentTime+0.5);}
function playAccept(){const c=getCtx();[0,0.12,0.24].forEach((d,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=[523,659,784][i];o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0.09,c.currentTime+d);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d+0.12);o.start(c.currentTime+d);o.stop(c.currentTime+d+0.14);});}
function playAlarmBad(){const c=getCtx();[0,.15,.3,.45].forEach(d=>{const o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.value=220;o.frequency.setValueAtTime(220,c.currentTime+d);o.frequency.setValueAtTime(180,c.currentTime+d+0.07);o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0.12,c.currentTime+d);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d+0.14);o.start(c.currentTime+d);o.stop(c.currentTime+d+0.16);});}
function playGoodChime(){const c=getCtx();[523.25,659.25,783.99,1046.50].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0,c.currentTime+i*.1);g.gain.linearRampToValueAtTime(.12,c.currentTime+i*.1+.05);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.1+.4);o.start(c.currentTime+i*.1);o.stop(c.currentTime+i*.1+.42);});}

function makeWaveform(active){const h=[6,14,10,20,8,16,12,22,6,18,10,14,8,20,12];return`<div class="call-waveform">${h.map((v,i)=>`<div class="wv-bar ${active?'active':''}" style="height:${active?4:v}px;animation-delay:${i*.06}s"></div>`).join('')}</div>`;}
let ringtoneHandle=null,callTimer=null,callSeconds=0;
function stopRingtone(){try{if(window._ringtone){window._ringtone.stop();window._ringtone=null;}}catch(e){}clearInterval(callTimer);}

/* ══ CINEMATIC ENGINE ══ */
function launchCinBad(cin,onDone){
  const ov=document.getElementById('cin-overlay'),body=document.getElementById('cin-body'),foot=document.getElementById('cin-foot');
  body.innerHTML='';foot.classList.remove('show');ov.classList.add('active');
  playAlarmBad();

  const title=document.createElement('div');
  title.style.cssText='font-family:var(--font-disp);font-size:1rem;font-weight:700;color:#e63946;margin-bottom:12px;letter-spacing:-.02em;';
  title.className='glitch';title.textContent='⚠ '+cin.title;body.appendChild(title);

  if(cin.accs&&cin.accs.length){
    const ag=document.createElement('div');ag.className='cin-accs';ag.id='cin-ag';
    cin.accs.forEach(a=>{const[n,s]=a.split('|');const c=document.createElement('div');c.className='cin-acc';c.innerHTML=`<div class="cin-acc-n">${n}</div><div class="cin-acc-s bad">${s}</div>`;ag.appendChild(c);});
    body.appendChild(ag);
    if(cin.prog){const p=document.createElement('div');p.className='cin-prog-wrap';p.id='cin-pw';p.innerHTML=`<div class="cin-prog-lbl">ATTACK PROGRESS</div><div class="cin-prog-track"><div class="cin-prog-fill" id="cin-pf"></div></div>`;body.appendChild(p);}
  }
  if(cin.dmg){const d=document.createElement('div');d.className='cin-dmg';d.id='cin-d';d.innerHTML=`<div class="cin-dmg-amt">${cin.dmg}</div><div class="cin-dmg-lbl">ESTIMATED LOSS / EXPOSURE</div>`;body.appendChild(d);}

  const lc=document.createElement('div');lc.style.marginTop='8px';body.appendChild(lc);
  let li=0;
  function nl(){
    if(li>=cin.lines.length){
      setTimeout(()=>{
        const ag=document.getElementById('cin-ag');
        if(ag){ag.classList.add('show');ag.querySelectorAll('.cin-acc').forEach((c,i)=>setTimeout(()=>c.classList.add('comp'),i*200));}
        const pw=document.getElementById('cin-pw');if(pw){pw.classList.add('show');setTimeout(()=>{document.getElementById('cin-pf').style.width='100%';},100);}
        const d=document.getElementById('cin-d');if(d)d.classList.add('show');
        setTimeout(()=>foot.classList.add('show'),1000);
      },400);
      window._cinBadDone=onDone;return;
    }
    const line=cin.lines[li];
    const el=document.createElement('div');el.className='cin-line';
    el.innerHTML=`<span class="cin-p">${line.p}</span><span class="${line.c}">${line.t}</span>`;
    lc.appendChild(el);requestAnimationFrame(()=>setTimeout(()=>el.classList.add('show'),20));
    li++;setTimeout(nl,270+Math.random()*110);
  }
  setTimeout(nl,500);
}
function closeCinBad(){document.getElementById('cin-overlay').classList.remove('active');if(window._cinBadDone){window._cinBadDone();window._cinBadDone=null;}}

function launchCinGood(fb,pts,onDone){
  const ov=document.getElementById('cin-good');playGoodChime();
  document.getElementById('cin-si').textContent=fb.icon||'🛡';
  document.getElementById('cin-gt').textContent=fb.t;
  document.getElementById('cin-gs').textContent='// '+(pts>=50?'BEST RESPONSE':'CORRECT DECISION');
  document.getElementById('cin-gtip').innerHTML=`<strong>Security Insight:</strong> ${fb.tip}`;
  document.getElementById('cin-pts').textContent='+'+pts+' PTS';
  const pc=document.getElementById('cin-parts');pc.innerHTML='';
  for(let i=0;i<30;i++){const p=document.createElement('div');p.className='cin-part';const angle=Math.random()*Math.PI*2,dist=80+Math.random()*200;p.style.cssText=`left:50%;top:50%;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;background:${['#2ecc71','#00b4d8','#ffd166'][Math.floor(Math.random()*3)]};animation-delay:${Math.random()*.3}s;animation-duration:${.6+Math.random()*.5}s;`;pc.appendChild(p);}
  ov.classList.add('active');window._cinGoodDone=onDone;
}
function closeCinGood(){document.getElementById('cin-good').classList.remove('active');if(window._cinGoodDone){window._cinGoodDone();window._cinGoodDone=null;}}

/* ══ RENDER ══ */
function renderScene(){
  const lvl=DATA[G.level];
  if(G.idx>=lvl.scenes.length){finishGame();return;}
  const sc=lvl.scenes[G.idx];G.pending=false;
  document.getElementById('breadcrumb').innerHTML=lvl.scenes.map((s,i)=>{const cls=i<G.idx?'done':i===G.idx?'now':'';return`<span class="bc-item ${cls}">${i+1}. ${s.title}</span>${i<lvl.scenes.length-1?'<span class="bc-sep">›</span>':''}`}).join('');
  document.getElementById('sh-label').textContent=sc.label;
  document.getElementById('sh-title').textContent=sc.title;
  document.getElementById('sh-meta').textContent=sc.meta;
  document.getElementById('feedback-area').innerHTML='';
  document.getElementById('choices-area').innerHTML='';
  if(sc.type==='email')renderEmail(sc);
  if(sc.type==='qr')renderQR(sc);
  if(sc.type==='call')renderCall(sc);
  if(sc.type==='social')renderSocial(sc);
  if(sc.type==='job')renderJob(sc);
  renderChoices(sc);
}

function renderEmail(sc){
  document.getElementById('scenario-body').innerHTML=`
    <div class="email-client" role="article">
      <div class="ec-titlebar" aria-hidden="true"><div class="ec-dots"><div class="ec-dot"></div><div class="ec-dot"></div><div class="ec-dot"></div></div><div class="ec-url">mail.cyberverse-sim.local</div></div>
      <div class="ec-header">
        <div class="ec-badge ${sc.badge.cls}" role="alert">⚠ ${sc.badge.text}</div>
        <div class="ec-from">FROM: <span>${sc.from}</span></div>
        <div class="ec-subject">${sc.subject}</div>
        <div class="ec-time">${sc.time}</div>
      </div>
      <div class="ec-body">${sc.body}<br><br>
        <a class="ec-link ${sc.link.malicious?'malicious':''}" aria-label="Suspicious link">${sc.link.text}</a>
        ${sc.note?`<br><br><small style="color:var(--amber);font-family:var(--font-mono);font-size:.72rem;">${sc.note}</small>`:''}
      </div>
    </div>`;}

function renderQR(sc){
  document.getElementById('scenario-body').innerHTML=`
    <div style="margin-bottom:16px;background:var(--surface);border:1px solid var(--rim);border-radius:6px;padding:16px 18px;">
      <div class="t-label" style="margin-bottom:8px;">SCENE CONTEXT</div>
      <p style="font-size:.88rem;color:var(--body);line-height:1.7;">${sc.context}</p>
      <div class="qr-warning" style="margin-top:12px;" role="alert">${sc.warning}</div>
    </div>
    <div class="qr-scene">
      <div class="qr-poster" role="img"><div class="qr-tamper-badge">TAMPERED</div><div class="qr-poster-name">SUSPICIOUS QR</div><div class="qr-poster-sub">FOUND AT LOCATION</div><div class="qr-holder" id="qr-fake-holder"></div><div class="qr-caption">${sc.qrFake.caption}</div><div style="font-family:var(--font-mono);font-size:.62rem;color:var(--muted);margin-top:6px;word-break:break-all;">${sc.qrFake.label}</div></div>
      <div class="qr-info-card">
        <div class="t-label" style="margin-bottom:8px;">SCENARIO DETAILS</div>
        ${sc.details.map(d=>`<div class="qr-detail"><span class="qr-detail-key">${d.k}</span><span>${d.v}</span></div>`).join('')}
        <div style="margin-top:14px;"><div class="t-label" style="margin-bottom:6px;color:var(--green);">✓ LEGITIMATE QR (REFERENCE)</div><div style="display:flex;align-items:center;gap:10px;"><div class="qr-holder" id="qr-real-holder" style="padding:6px;"></div><div><div style="font-family:var(--font-mono);font-size:.68rem;color:var(--green);margin-bottom:3px;">✓ ${sc.qrReal.caption}</div><div style="font-family:var(--font-mono);font-size:.62rem;color:var(--muted);word-break:break-all;">${sc.qrReal.label}</div></div></div></div>
      </div>
    </div>`;
  setTimeout(()=>{try{new QRCode(document.getElementById('qr-fake-holder'),{text:sc.qrFake.url,width:140,height:140,colorDark:'#1a0505',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}catch(e){}try{new QRCode(document.getElementById('qr-real-holder'),{text:sc.qrReal.url,width:90,height:90,colorDark:'#050f0a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}catch(e){}},80);}

function renderCall(sc){
  document.getElementById('scenario-body').innerHTML=`
    <div class="phone-wrap"><div class="phone"><div class="phone-notch" aria-hidden="true"><div class="phone-notch-pill"></div></div>
      <div class="phone-screen" id="phone-screen">
        <div class="phone-call"><div class="call-status t-mono">INCOMING CALL</div><div class="call-avatar" aria-hidden="true">${sc.caller.avatar}</div><div class="call-name">${sc.caller.name}</div><div class="call-num t-mono">${sc.caller.num}</div>${makeWaveform(false)}<div class="call-subtitle t-mono">Audio simulation active<br>Listen carefully for anomalies</div>
          <div class="call-btns"><button class="call-btn call-decline" onclick="handleDecline()">📵</button><button class="call-btn call-accept" onclick="handleAccept()">📞</button></div>
        </div>
      </div>
    </div></div>
    <div style="background:var(--surface);border:1px solid var(--rim);border-radius:6px;padding:14px 16px;margin-bottom:20px;">
      <div class="t-label" style="margin-bottom:6px;">AUDIO ANALYSIS NOTE</div>
      <p style="font-size:.84rem;color:var(--body);line-height:1.6;">${sc.audioNote}</p>
    </div>`;
  try{ringtoneHandle=playRingtone(true);window._ringtone=ringtoneHandle;}catch(e){}}

function handleDecline(){stopRingtone();playDecline();const ps=document.getElementById('phone-screen');if(ps)ps.innerHTML=`<div class="phone-idle" style="text-align:center;padding:40px 20px;"><div style="font-size:2rem;margin-bottom:10px;">📵</div><div style="font-family:var(--font-mono);font-size:.72rem;color:var(--muted);">CALL DECLINED</div></div>`;setTimeout(()=>document.getElementById('choices-area').scrollIntoView({behavior:'smooth',block:'start'}),300);}
function handleAccept(){stopRingtone();playAccept();const sc=DATA[G.level].scenes[G.idx];callSeconds=0;const ps=document.getElementById('phone-screen');ps.innerHTML=`<div class="phone-answered"><div class="ans-status">CONNECTED</div><div class="ans-name">${sc.caller.name}</div><div class="ans-timer t-mono" id="ctd">0:00</div>${makeWaveform(true)}<div class="ans-script" id="call-script" style="opacity:0;transition:opacity .5s;"></div><button class="ans-endcall" onclick="handleEndCall()">📵</button></div>`;callTimer=setInterval(()=>{callSeconds++;const el=document.getElementById('ctd');if(el)el.textContent=`${Math.floor(callSeconds/60)}:${String(callSeconds%60).padStart(2,'0')}`;},1000);const script=sc.script,se=document.getElementById('call-script');if(se){se.style.opacity='1';let i=0;const ti=setInterval(()=>{if(!document.getElementById('call-script')){clearInterval(ti);return;}document.getElementById('call-script').textContent=script.slice(0,i);i+=2;if(i>script.length)clearInterval(ti);},30);}}
function handleEndCall(){stopRingtone();playDecline();const ps=document.getElementById('phone-screen');if(ps)ps.innerHTML=`<div class="phone-idle" style="text-align:center;padding:40px 20px;"><div style="font-size:2rem;margin-bottom:10px;">📵</div><div style="font-family:var(--font-mono);font-size:.72rem;color:var(--muted);">CALL ENDED</div></div>`;}

function renderSocial(sc){
  document.getElementById('scenario-body').innerHTML=`
    <div class="social-app" role="article">
      <div class="social-tbar"><span style="font-size:1.2rem;">📷</span><div class="social-tbar-name">${sc.platform}</div><div class="social-tbar-sub">Direct Messages</div></div>
      <div class="social-dm">
        <div class="ec-badge ${sc.badge.cls}" role="alert" style="margin-bottom:14px;">⚠ ${sc.badge.text}</div>
        <div class="social-dmh"><div class="social-av">${sc.sender.avatar}</div><div><div class="social-sname">${sc.sender.name} <span style="color:rgba(255,255,255,.3);font-size:.75rem;" title="Not verified">○</span></div><div class="social-smeta">${sc.sender.followers} followers · Joined recently</div></div></div>
        <div class="social-msg">${sc.message}</div>
        <div class="social-time">Today, 2:22 PM</div>
        <div class="social-lp"><div style="font-size:1.8rem;">${sc.linkPreview.icon}</div><div><div class="social-lp-dom">${sc.linkPreview.domain}</div><div class="social-lp-ttl">${sc.linkPreview.title}</div></div></div>
        <div style="margin-top:14px;background:rgba(244,162,97,.07);border:1px solid rgba(244,162,97,.2);border-radius:4px;padding:12px 14px;">
          <div class="t-label" style="color:var(--amber);margin-bottom:6px;">⚠ RED FLAGS</div>
          ${sc.redFlags.map(f=>`<div style="font-size:.8rem;color:var(--body);padding:2px 0;">• ${f}</div>`).join('')}
        </div>
      </div>
    </div>`;}

function renderJob(sc){
  document.getElementById('scenario-body').innerHTML=`
    <div class="job-card" role="article">
      <div class="ec-badge ${sc.badge.cls}" role="alert" style="margin:16px 18px 0;display:inline-flex;">⚠ ${sc.badge.text}</div>
      <div class="job-head"><div class="job-logo">${sc.company.logo}</div><div><div class="job-co">${sc.company.name}</div><div class="job-dom">${sc.company.domain}</div></div></div>
      <div class="job-body">
        <div class="job-ttl">${sc.jobTitle}</div>
        <div class="job-tags">${sc.tags.map(t=>`<span class="job-tag">${t}</span>`).join('')}</div>
        <div class="job-desc">${sc.description}</div>
        <div class="job-cta"><div class="job-cta-t">${sc.ctaText}</div><div class="job-cta-l">${sc.ctaLink}</div></div>
        <div class="job-rf"><strong style="color:var(--red);">⚠ Red Flags:</strong> ${sc.redFlags.join(' · ')}</div>
      </div>
    </div>`;}

function renderChoices(sc){
  document.getElementById('choices-area').innerHTML=`
    <div class="choices-section" role="group" aria-labelledby="choices-lbl">
      <div class="choices-label" id="choices-lbl">// SELECT YOUR RESPONSE — press 1–4 or Tab+Enter</div>
      <div class="choice-list">${sc.choices.map((c,i)=>`<button class="choice" data-idx="${i}" onclick="handleChoice(${JSON.stringify(c).replace(/"/g,'&quot;')})" aria-label="Option ${c.k}: ${c.text}"><span class="choice-key" aria-hidden="true">${c.k}</span><span>${c.text}</span></button>`).join('')}</div>
      <div style="font-family:var(--font-mono);font-size:.6rem;color:var(--muted);margin-top:10px;">⌨ Press <kbd style="background:var(--rim);padding:1px 5px;border-radius:2px;">1</kbd>–<kbd style="background:var(--rim);padding:1px 5px;border-radius:2px;">${sc.choices.length}</kbd> to select</div>
    </div>`;
  setTimeout(()=>{const f=document.querySelector('.choice');if(f)f.focus();},80);}

function handleChoice(c){
  if(G.pending)return;G.pending=true;stopRingtone();
  G.health=Math.min(100,Math.max(0,G.health+(c.hp||0)));
  G.trust=Math.min(100,Math.max(0,G.trust+(c.tp||0)));
  G.score+=c.pts;
  if(c.type==='good'||c.type==='best')G.good++;else G.bad++;
  updateHUD();
  document.querySelectorAll('.choice').forEach(b=>{b.disabled=true;b.style.opacity='0.4';b.style.cursor='default';});
  const sc=DATA[G.level].scenes[G.idx],fb=sc.fb[c.type]||sc.fb.good;
  announceToSR(`${c.type==='good'||c.type==='best'?'Correct':'Incorrect'} response. Score: ${Math.max(0,G.score)}. Health: ${Math.max(0,G.health)}%.`);
  if(c.type==='bad'&&fb.cin){launchCinBad(fb.cin,()=>showFB(fb,c.type));}
  else if(c.type==='good'||c.type==='best'){launchCinGood(fb,c.pts,()=>showFB(fb,c.type));}
  else{showFB(fb,c.type);}
}

function showFB(fb,type){
  const cls=(type==='best'||type==='good')?'good':type==='warn'?'warn':'bad';
  document.getElementById('feedback-area').innerHTML=`
    <div class="feedback-card ${cls}" role="region">
      <div class="fc-header"><div class="fc-icon">${fb.icon}</div><div class="fc-title ${cls}">${fb.t}</div></div>
      <div class="fc-text">${fb.txt}</div>
      <div class="tip-card"><div class="tip-label">// SECURITY TIP</div><p>${fb.tip}</p></div>
      <div class="fc-actions"><button class="btn btn-primary" onclick="nextScene()">Next Scenario →</button></div>
    </div>`;
  document.getElementById('feedback-area').scrollIntoView({behavior:'smooth',block:'start'});}

function nextScene(){G.idx++;saveState();renderScene();window.scrollTo({top:0,behavior:'smooth'});}

function finishGame(){
  stopRingtone();
  localStorage.setItem('cv_result',JSON.stringify({level:G.level,health:Math.max(0,G.health),trust:Math.max(0,G.trust),score:Math.max(0,G.score),good:G.good,bad:G.bad}));
  window.location.href='ending.html';}

document.addEventListener('keydown',e=>{
  if(e.key>='1'&&e.key<='4'){const idx=parseInt(e.key)-1;const choices=document.querySelectorAll('.choice:not([disabled])');if(choices[idx])choices[idx].click();}
  if(e.key==='Escape'){if(document.getElementById('cin-overlay').classList.contains('active'))closeCinBad();if(document.getElementById('cin-good').classList.contains('active'))closeCinGood();}
});

const currentUser=DB.getCurrent();
if(!currentUser){window.location.href='auth.html';}
else{
  document.getElementById('hud-av').textContent=currentUser.name.charAt(0).toUpperCase();
  document.getElementById('hud-uname').textContent=currentUser.name.split(' ')[0].toUpperCase();
  loadState();updateHUD();renderScene();
}
</script>
</body>
</html>
