<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYBERVERSE — Login / Register</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="shared.css">

<style>

/* ---------- BACKGROUND ---------- */

body{
background:#020611;
overflow-x:hidden;
}

.cyber-bg{
position:fixed;
inset:0;
z-index:-3;

background:
linear-gradient(rgba(31,143,255,.07) 1px, transparent 1px),
linear-gradient(90deg, rgba(31,143,255,.07) 1px, transparent 1px);

background-size:60px 60px;
animation:gridMove 20s linear infinite;
}

@keyframes gridMove{
from{transform:translateY(0)}
to{transform:translateY(60px)}
}

.cyber-glow{
position:fixed;
inset:0;
z-index:-2;

background:
radial-gradient(circle at center,
rgba(31,143,255,.15),
transparent 60%);
}

.scanline{
position:fixed;
inset:0;
z-index:-1;

background:
linear-gradient(
transparent 96%,
rgba(31,143,255,.08) 100%
);

background-size:100% 4px;

animation:scanMove 8s linear infinite;
}

@keyframes scanMove{
from{background-position:0 0}
to{background-position:0 200px}
}


/* ---------- AUTH WRAP ---------- */

.auth-wrap{
max-width:440px;
margin:0 auto;
text-align:center;
}

/* ---------- LOGO ---------- */

.auth-logo-sm{

font-family:var(--font-disp);
font-size:2.2rem;
font-weight:800;

background:linear-gradient(135deg,#ffffff,#1f8fff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 12px rgba(31,143,255,.6),
0 0 28px rgba(31,143,255,.3);

animation:logoPulse 3s infinite alternate;

margin-bottom:6px;

}

@keyframes logoPulse{
from{filter:brightness(1)}
to{filter:brightness(1.3)}
}

.auth-tagline{
font-family:var(--font-mono);
font-size:.7rem;
letter-spacing:.2em;
color:#6fb3ff;
margin-bottom:40px;
}

/* ---------- CARD ---------- */

.auth-card{

position:relative;

background:rgba(4,11,29,.85);

border:1px solid rgba(31,143,255,.25);

border-radius:12px;

backdrop-filter:blur(10px);

box-shadow:
0 0 40px rgba(31,143,255,.15),
inset 0 0 20px rgba(31,143,255,.08);

overflow:hidden;

}

.auth-card::before{
content:"";
position:absolute;
inset:-1px;
border-radius:12px;

background:linear-gradient(
120deg,
#1f8fff,
transparent,
#00a2ff
);

opacity:.25;
filter:blur(8px);

z-index:-1;
}


/* ---------- TABS ---------- */

.auth-tabs{
display:grid;
grid-template-columns:1fr 1fr;
}

.auth-tab{

padding:14px;

font-family:var(--font-mono);

font-size:.72rem;

letter-spacing:.15em;

text-transform:uppercase;

border:none;

background:#040b1d;

color:#8fa4c2;

cursor:pointer;

transition:.25s;

}

.auth-tab:hover{
color:#1f8fff;
}

.auth-tab.active{

background:rgba(31,143,255,.1);

color:#1f8fff;

border-bottom:2px solid #1f8fff;

}


/* ---------- BODY ---------- */

.auth-body{
padding:30px 24px;
text-align:left;
}

.auth-body h2{
font-family:var(--font-disp);
font-size:1.25rem;
color:#FFFFFF;
}

.auth-body p{
font-size:.85rem;
color:#FFFFFF;
margin-bottom:24px;
}


/* ---------- INPUTS ---------- */

.form-input{

background:#040b1d;

border:1px solid rgba(31,143,255,.25);

border-radius:6px;

padding:10px;

color:#d7eaff;

transition:.25s;

}

.form-input:focus{

outline:none;

border-color:#1f8fff;

box-shadow:0 0 10px rgba(31,143,255,.4);

}


/* ---------- BUTTON ---------- */

.btn-primary{

background:linear-gradient(
135deg,
#1f8fff,
#00a2ff
);

border:none;

color:white;

box-shadow:0 0 15px rgba(31,143,255,.45);

}

.btn-primary:hover{

transform:translateY(-1px);

box-shadow:0 0 25px rgba(31,143,255,.7);

}


/* ---------- FOOTER ---------- */

.auth-footer{

background:#040b1d;

border-top:1px solid rgba(31,143,255,.2);

color:#8fa4c2;

}

.auth-switch{
color:#1f8fff;
cursor:pointer;
}

</style>
</head>


<body class="page-enter">


<div class="cyber-bg"></div>
<div class="cyber-glow"></div>
<div class="scanline"></div>


<a href="#main-content" class="skip-link">Skip to main content</a>


<button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">🌙</button>


<div class="app layer" id="main-content" role="main">

<div class="auth-wrap">


<div class="auth-logo-sm">CYBERVERSE</div>

<div class="auth-tagline">
TRACE THE UNKNOWN 
</div>


<div class="auth-card">

<div class="auth-tabs">

<button class="auth-tab active" id="tab-login" onclick="switchTab('login')">
LOGIN
</button>

<button class="auth-tab" id="tab-register" onclick="switchTab('register')">
REGISTER
</button>

</div>


<div id="panel-login" class="auth-body">

<h2>Welcome back</h2>

<p>Sign in with your registered email to continue.</p>

<div class="form-row">
<input class="form-input" type="email" id="login-email" placeholder="Email Address">
</div>

<button class="btn btn-primary btn-block btn-lg" onclick="doLogin()">
→ Sign In
</button>

</div>


<div id="panel-register" class="auth-body" style="display:none;">

<h2>Create account</h2>

<p>Register to track your progress and earn badges.</p>

<div class="form-row">
<input class="form-input" type="text" id="reg-name" placeholder="Full Name">
</div>

<div class="form-row">
<input class="form-input" type="number" id="reg-age" placeholder="Age">
</div>

<div class="form-row">
<input class="form-input" type="tel" id="reg-phone" placeholder="Phone Number">
</div>

<div class="form-row">
<input class="form-input" type="email" id="reg-email" placeholder="Gmail Address">
</div>

<button class="btn btn-primary btn-block btn-lg" onclick="doRegister()">
→ Create Account & Play
</button>

</div>


<div class="auth-footer">

<span id="auth-switch-txt">New here? </span>

<span class="auth-switch" id="auth-switch-btn" onclick="switchTab('register')">
Create an account
</span>

</div>


</div>
</div>
</div>


<script src="shared.js"></script>


<script>

/* TAB SWITCH */

function switchTab(tab){

const isLogin = (tab === 'login')

document.getElementById('tab-login').classList.toggle('active', isLogin)

document.getElementById('tab-register').classList.toggle('active', !isLogin)

document.getElementById('panel-login').style.display = isLogin ? 'block' : 'none'

document.getElementById('panel-register').style.display = isLogin ? 'none' : 'block'

}

async function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const btn   = document.querySelector('#panel-login .btn-primary');
  if(!email) return alert('Enter your email address');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const user = await DB.login(email);
    DB.setCurrent(user);
    window.location.href = 'dashboard.html';
  } catch(e) {
    alert(e.message || 'Login failed');
    btn.textContent = '→ Sign In'; btn.disabled = false;
  }
}

async function doRegister(){
  const name  = document.getElementById('reg-name').value.trim();
  const age   = document.getElementById('reg-age').value;
  const phone = document.getElementById('reg-phone').value;
  const email = document.getElementById('reg-email').value.trim();
  if(!name||!age||!phone||!email) return alert('Fill all fields');
  const btn = document.querySelector('#panel-register .btn-primary');
  btn.textContent = 'Creating account…'; btn.disabled = true;
  try {
    const user = await DB.register({ name, age, phone, email });
    DB.setCurrent(user);
    window.location.href = 'dashboard.html';
  } catch(e) {
    alert(e.message || 'Registration failed');
    btn.textContent = '→ Create Account & Play'; btn.disabled = false;
  }
}

</script>


<script>

/* CYBER PARTICLES */

for(let i=0;i<30;i++){

const p=document.createElement("div")

p.style.position="fixed"
p.style.width="2px"
p.style.height="2px"
p.style.pointerEvents="none"

p.style.background="#1f8fff"
p.style.opacity=Math.random()

p.style.left=Math.random()*100+"vw"
p.style.top=Math.random()*100+"vh"

p.style.boxShadow="0 0 6px #1f8fff"

p.style.animation=`float ${8+Math.random()*10}s linear infinite`

document.body.appendChild(p)

}

const style=document.createElement("style")

style.innerHTML=`
@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-120vh)}
}
`

document.head.appendChild(style)

</script>


</body>
</html>
